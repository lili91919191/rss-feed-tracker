<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Suivi RSS - Linux Mint, Bitcoin, IA, Méditation</title>

  <!-- Lien vers le manifest PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192x192.png" />

  <style>
    :root {
      --bg: #1a1a1a;
      --text: #e0e0e0;
      --card-bg: #2d2d2d;
      --accent: #1abc9c;
      --border: #444;
      --date: #aaa;
      --search-bg: #333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box {
      padding: 12px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background-color: var(--search-bg);
      color: var(--text);
      outline: none;
      font-size: 1em;
    }

    .section {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .section h2 {
      color: var(--accent);
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
      margin: 0 0 15px 0;
      font-size: 1.3em;
    }

    .article {
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px dashed var(--border);
    }

    .article.hidden {
      display: none;
    }

    .article:last-child {
      border-bottom: none;
    }

    .article h3 {
      margin: 0 0 6px 0;
      font-size: 1.1em;
    }

    .article a {
      color: var(--accent);
      text-decoration: none;
    }

    .article a:hover {
      text-decoration: underline;
    }

    .date {
      font-size: 0.85em;
      color: var(--date);
    }

    .loading, .error {
      text-align: center;
      font-style: italic;
      color: var(--date);
      padding: 20px 0;
    }

    .error {
      color: #e74c3c;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: var(--date);
      font-size: 0.85em;
      padding: 20px 0;
    }

    @media (max-width: 600px) {
      .section {
        padding: 15px;
      }
      header h1 {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔔 Suivi RSS</h1>
      <p>Linux Mint • Bitcoin • IA • Méditation</p>
    </header>

    <div class="controls">
      <input type="text" id="searchInput" class="search-box" placeholder="🔍 Rechercher un article..." />
    </div>

    <div id="linux-mint" class="section">
      <h2>🐧 Linux Mint</h2>
      <div class="feed-content"><div class="loading">Chargement...</div></div>
    </div>

    <div id="bitcoin" class="section">
      <h2>₿ Bitcoin</h2>
      <div class="feed-content"><div class="loading">Chargement...</div></div>
    </div>

    <div id="ia" class="section">
      <h2>🤖 Agents IA</h2>
      <div class="feed-content"><div class="loading">Chargement...</div></div>
    </div>

    <div id="meditation" class="section">
      <h2>🧘 Méditation</h2>
      <div class="feed-content"><div class="loading">Chargement...</div></div>
    </div>

    <footer>
      <p>© 2025 Suivi RSS | Mis à jour toutes les 5 min</p>
    </footer>
  </div>

  <script>
    // --- Recherche en direct ---
    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase().trim();
      if (query === "") {
        document.querySelectorAll(".article").forEach(el => el.classList.remove("hidden"));
      } else {
        document.querySelectorAll(".article").forEach(article => {
          const title = article.querySelector("h3 a").textContent.toLowerCase();
          article.classList.toggle("hidden", !title.includes(query));
        });
      }
    });

    // --- Rendu des articles ---
    function renderItems(items, container) {
      container.innerHTML = '';
      items.forEach(({ title, link, date }) => {
        const safeLink = /^https?:\/\//i.test(link) ? link : "#";
        const dateObj = date ? new Date(date) : null;
        const formattedDate = (dateObj && !isNaN(dateObj))
          ? dateObj.toLocaleDateString('fr-FR', { year: 'numeric', month: 'short', day: 'numeric' })
          : "Date inconnue";

        const article = document.createElement("div");
        article.className = "article";

        const h3 = document.createElement("h3");
        const a = document.createElement("a");
        a.href = safeLink;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = title || "Sans titre";
        h3.appendChild(a);

        const dateDiv = document.createElement("div");
        dateDiv.className = "date";
        dateDiv.textContent = formattedDate;

        article.appendChild(h3);
        article.appendChild(dateDiv);
        container.appendChild(article);
      });
    }

    // --- Chargement via rss2json (JSON) ---
    async function tryRss2Json(url) {
      const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
      const res = await fetch(api);
      if (!res.ok) throw new Error("rss2json HTTP " + res.status);
      const data = await res.json();
      if (data.status !== "ok") throw new Error("rss2json status: " + data.status);
      return data.items.map(i => ({ title: i.title, link: i.link, date: i.pubDate }));
    }

    // --- Chargement via proxy XML (fallback) ---
    async function tryXmlProxy(url) {
      const proxies = [
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      ];
      for (const makeProxy of proxies) {
        try {
          const res = await fetch(makeProxy(url));
          if (!res.ok) continue;
          const text = await res.text();
          const rss = new DOMParser().parseFromString(text, "text/xml");
          const nodes = rss.querySelectorAll("item");
          if (nodes.length === 0) continue;
          return Array.from(nodes).map(item => {
            const linkEl = item.querySelector("link");
            const link = (linkEl?.nextSibling?.nodeValue || linkEl?.textContent || "").trim();
            const dateNode = item.querySelector("pubDate") || item.querySelector("dc\\:date");
            return {
              title: item.querySelector("title")?.textContent || "",
              link,
              date: dateNode?.textContent || ""
            };
          });
        } catch (_) {}
      }
      throw new Error("Tous les proxies ont échoué");
    }

    // --- Fonction de chargement RSS ---
    async function fetchRSS(url, containerId) {
      const section = document.getElementById(containerId);
      const container = section.querySelector(".feed-content");
      container.innerHTML = '<div class="loading">Chargement...</div>';

      try {
        let items;
        try {
          items = await tryRss2Json(url);
        } catch (_) {
          items = await tryXmlProxy(url);
        }
        if (items.length === 0) {
          container.innerHTML = '<p class="error">Aucun article trouvé.</p>';
          return;
        }
        renderItems(items, container);
      } catch (error) {
        console.error(`Erreur RSS (${containerId}) :`, error);
        container.innerHTML = `<p class="error">Impossible de charger.</p>`;
      }
    }

    // --- Liste des flux ---
    const feeds = [
      { url: "https://linuxmint.com/feed/", id: "linux-mint" },
      { url: "https://news.google.com/rss/search?q=bitcoin&hl=fr&gl=FR&ceid=FR:fr", id: "bitcoin" },
      { url: "https://feeds.feedburner.com/TheAIAdvantage", id: "ia" },
      { url: "https://meditationblog.org/feed/", id: "meditation" }
    ];

    // --- Charger les flux ---
    function loadAllFeeds() {
      feeds.forEach(feed => fetchRSS(feed.url, feed.id));
    }

    loadAllFeeds();
    setInterval(loadAllFeeds, 5 * 60 * 1000);

    // --- Enregistrement du Service Worker (PWA) ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW enregistré :', reg.scope))
          .catch(err => console.log('Échec SW :', err));
      });
    }
  </script>
</body>
</html>
